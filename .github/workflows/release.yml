name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run pytest
      - run: uv build
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
