site_name: Proofwright
site_description: Deterministic, zero-LLM structural checks for an LLM Wiki.
site_url: https://maxb2.github.io/proofwright/
repo_url: https://github.com/maxb2/proofwright
repo_name: maxb2/proofwright
edit_uri: edit/main/docs/
copyright: Copyright &copy; Matt Anderson — MIT License

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: [.]
      check_paths: true

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Installation: install.md
  - Getting started: getting-started.md
  - CLI reference: cli.md
  - Checks: checks.md
  - Configuration: configuration.md
  - Retrieval: retrieval.md
  - Extending: extending.md
  - API reference:
      - Model: api/model.md
      - Config: api/config.md
      - Checks: api/checks.md
      - Retrieval: api/retrieval.md
      - Plugins: api/plugins.md
