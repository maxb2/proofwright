[paths]
raw = "raw/"
wiki = "wiki/"
schema = "CLAUDE.md"
index = "wiki/index.md"

[links]
style = "markdown"

[frontmatter]
required = ["type"]

[citation]
claim_policy = "off"   # this wiki uses no inline [n] citations

[checks]
fail_on = ["error"]

